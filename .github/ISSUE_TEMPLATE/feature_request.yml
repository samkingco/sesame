name: Feature Request
description: Suggest something new
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: A clear description of the feature.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      description: What problem does it solve or what workflow does it improve?
    validations:
      required: true
