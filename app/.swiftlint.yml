included:
  - Sesame
  - SesameTests
  - SesameAutoFill

excluded:
  - Vendor
  - Tools
  - SesameScreenshots

line_length:
  warning: 120
  error: 150

identifier_name:
  min_length:
    warning: 1
  allowed_symbols:
    - _

cyclomatic_complexity:
  warning: 15

opt_in_rules:
  - sorted_imports
  - private_over_fileprivate
  - implicit_optional_initialization
  - modifier_order
  - mark

disabled_rules:
  - force_cast
  - force_unwrapping
  - force_try
  - todo
  - nesting
  - type_body_length
  - file_length
  - function_body_length
  - trailing_comma
  - multiple_closures_with_trailing_closure
  - statement_position
  - large_tuple
